<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Pushpam A/C Bar POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

    />
    <script
      src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"

    <script
      src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"

    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        background: #f7f8fa;
        color: #1a1a2e;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: #f0f0f5;
      }
      ::-webkit-scrollbar-thumb {
        background: #c8c8d8;
        border-radius: 4px;
      }
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      input,
      select,
      textarea {
        background: #fff;
        border: 1.5px solid #e0e0ee;
        color: #1a1a2e;
        border-radius: 10px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 14px;
        outline: none;
        width: 100%;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus {
        border-color: #c8873a;
      }
      button {
        cursor: pointer;
        font-family: inherit;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      button:active {
        transform: scale(0.97);
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #print-area,
        #print-area * {
          visibility: visible;
        }
        #print-area {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: sans-serif;
          gap: 12px;
        "
      >
        <div
          style="
            font-family: Georgia, serif;
            font-size: 28px;
            color: #c8873a;
            letter-spacing: 4px;
          "
        >
          Pushpam A/C Bar
        </div>
        <div style="color: #aaa; font-size: 13px">Starting...</div>
      </div>
    </div>
    <div id="print-area" style="display: none"></div>
    <script src="firebase-init.js"></script>
    <script type="text/babel">
      const { useState, useCallback, useMemo, useEffect, useRef } = React;
      const SESSION_KEY = "pushpam_app_auth";
      const DEFAULT_SETTINGS = {
        barName: "Pushpam A/C Bar",
        barAddress: "",
        gstNumber: "",
        gstRate: 18,
        gstInclusive: false,
        tables: "T1,T2,T3,T4,T5,T6,T7,T8",
        currency: "₹",
      };
      const CATEGORIES = [
        "All",
        "Liquor",
        "Beer",
        "Soft Drinks",
        "Cocktails",
        "Mocktails",
      ];
      // --- CUSTOM ERROR LOGGER ---
      function saveLog(action, error) {
        console.error("🚨 LOG CAUGHT:", action, error);

        const logEntry = {
          timestamp: new Date().toLocaleString(),
          action: action,
          errorMessage: error
            ? error.message || JSON.stringify(error)
            : "Unknown Error",
        };

        let currentLogs = [];
        try {
          currentLogs = JSON.parse(
            localStorage.getItem("pushpam_error_logs") || "[]",
          );
        } catch (e) {}

        currentLogs.push(logEntry);
        localStorage.setItem("pushpam_error_logs", JSON.stringify(currentLogs));
      }

      function getGstRate(s) {
        return (+s.gstRate || 18) / 100;
      }
      function calcTotals(sub, s) {
        const r = getGstRate(s);
        if (s.gstInclusive) {
          const g = sub - sub / (1 + r);
          return { subtotal: sub / (1 + r), gstAmount: g, total: sub };
        }
        const g = sub * r;
        return { subtotal: sub, gstAmount: g, total: sub + g };
      }

      function mapInvRow(r) {
        const d = r._doc || r;
        return {
          id: r.id,
          name: d.name || "",
          category: d.category || "",
          imageUrl: d.imageUrl || "",
          price30ml: d.price30ml || 0,
          priceBottle: d.priceBottle || 0,
          mlPerBottle: d.mlPerBottle || 750,
          qtyAvailable: d.qtyAvailable || 0,
          lowStockThreshold: d.lowStockThreshold || 2,
          active: d.active !== false,
          _createdAt: d.createdAt
            ? (d.createdAt.toDate
                ? d.createdAt.toDate()
                : new Date(d.createdAt)
              ).toLocaleDateString("en-IN")
            : "-",
        };
      }
      function mapOrderRow(r) {
        const d = r._doc || r;
        let dt = "";
        if (d.createdAt) {
          const t = d.createdAt.toDate
            ? d.createdAt.toDate()
            : new Date(d.createdAt);
          dt =
            t.toLocaleDateString("en-IN") + " " + t.toLocaleTimeString("en-IN");
        }
        return (d.items || []).map((i) => ({
          orderId: d.orderId || r.id,
          tableNumber: d.tableNumber || "",
          customerName: d.customerName || "",
          itemId: i.itemId,
          itemName: i.itemName,
          qty: i.qty,
          unit: i.unit,
          unitPrice: i.unitPrice,
          lineTotal: i.lineTotal,
          status: d.status,
          dateTime: dt,
        }));
      }
      function mapBillRow(r) {
        const d = r._doc || r;
        let dt = "";
        if (d.createdAt) {
          const t = d.createdAt.toDate
            ? d.createdAt.toDate()
            : new Date(d.createdAt);
          dt = t.toLocaleString("en-IN");
        }
        return {
          billId: d.billId || r.id,
          tableNumber: d.tableNumber || "",
          customerName: d.customerName || "",
          customerPhone: d.customerPhone || "",
          subtotal: d.subtotal || 0,
          gstAmount: d.gstAmount || 0,
          total: d.total || 0,
          dateTime: dt,
          items: d.items || [],
        };
      }

      function printBill(bill, settings) {
        const hg = (bill.gstAmount / 2).toFixed(2);
        const html = `<style>@page{margin:0;size:auto}body{font-family:Arial,sans-serif;max-width:320px;margin:10px auto;font-size:12px;padding:0 8px}.header{background:#1A1A2E;color:#C8873A;text-align:center;padding:12px}.header h1{font-size:20px;margin:0;letter-spacing:2px}.header p{color:#ccc;font-size:10px;margin:2px 0}.meta{padding:8px 12px;border-bottom:1px dashed #ccc;display:flex;justify-content:space-between;font-size:11px}table{width:100%;border-collapse:collapse}th{background:#f0f0f0;padding:6px 8px;font-size:10px;text-align:left}td{padding:5px 8px;border-bottom:1px solid #f5f5f5;font-size:11px}.grand td{font-size:15px;color:#C8873A;font-weight:bold}.footer{text-align:center;color:#888;font-size:10px;padding:10px;border-top:1px dashed #ccc;margin-top:8px}</style><div class="header"><h1>${settings.barName}</h1><p>${settings.barAddress || ""}</p><p>GSTIN: ${settings.gstNumber || ""}</p></div><div class="meta"><span>Bill: ${bill.billId}</span><span>${bill.dateTime}</span></div><div class="meta"><span>Table: ${bill.tableNumber}</span><span>${bill.customerName || "Guest"}</span></div><table><thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amt</th></tr></thead><tbody>${bill.items.map((i) => `<tr><td>${i.name}<br><small>${i.unit}</small></td><td>${i.qty}</td><td>₹${(+i.unitPrice || 0).toFixed(0)}</td><td>₹${(+i.lineTotal || 0).toFixed(0)}</td></tr>`).join("")}</tbody><tfoot><tr><td colspan="3" style="text-align:right">Subtotal</td><td>₹${(+bill.subtotal).toFixed(2)}</td></tr><tr><td colspan="3" style="text-align:right">CGST (${(+settings.gstRate || 18) / 2}%)</td><td>₹${hg}</td></tr><tr><td colspan="3" style="text-align:right">SGST (${(+settings.gstRate || 18) / 2}%)</td><td>₹${hg}</td></tr><tr class="grand"><td colspan="3" style="text-align:right">TOTAL</td><td>₹${(+bill.total).toFixed(0)}</td></tr></tfoot></table><div class="footer">Thank you!</div>`;
        const pa = document.getElementById("print-area");
        pa.innerHTML = html;
        pa.style.display = "block";
        window.print();
        setTimeout(() => {
          pa.style.display = "none";
          pa.innerHTML = "";
        }, 1000);
      }

      // ── SECURE GITHUB UPLOAD ──────────────────────────────────
      function fileToBase64(file) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }

      async function uploadToGithub(file, itemId) {
        let config;
        try {
          const res = await fetch("/api/github-config");
          config = await res.json();
        } catch (e) {
          console.error("GitHub config fetch failed");
          return "";
        }

        const { githubOwner, githubRepo, githubToken } = config;
        if (!githubOwner || !githubRepo || !githubToken) return "";

        const base64Full = await fileToBase64(file);
        const base64Content = base64Full.split(",")[1];
        const ext = file.type.includes("png") ? "png" : "jpg";
        const path = `images/${itemId}.${ext}`;
        let sha = undefined;
        try {
          const check = await fetch(
            `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`,
            { headers: { Authorization: `token ${githubToken}` } },
          );
          if (check.ok) {
            const existing = await check.json();
            sha = existing.sha;
          }
        } catch (_) {}
        const payload = {
          message: `Upload image for ${itemId}`,
          content: base64Content,
        };
        if (sha) payload.sha = sha;
        const res = await fetch(
          `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`,
          {
            method: "PUT",
            headers: {
              Authorization: `token ${githubToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          },
        );
        const json = await res.json();
        if (json.content?.download_url) return json.content.download_url;
        return `https://raw.githubusercontent.com/${githubOwner}/${githubRepo}/main/${path}`;
      }

      function useToast() {
        const [t, s] = useState([]);
        const toast = useCallback((m, tp = "info") => {
          const id = Date.now();
          s((p) => [...p, { id, m, tp }]);
          setTimeout(() => s((p) => p.filter((x) => x.id !== id)), 3500);
        }, []);
        return { toasts: t, toast };
      }
      function ToastContainer({ toasts }) {
        const c = { info: "#C8873A", success: "#27AE60", error: "#E74C3C" };
        return (
          <div
            style={{
              position: "fixed",
              top: 70,
              left: 16,
              zIndex: 9999,
              display: "flex",
              flexDirection: "column",
              gap: 8,
              maxWidth: "calc(100% - 32px)",
              pointerEvents: "none",
            }}
          >
            {toasts.map((t) => (
              <div
                key={t.id}
                style={{
                  background: "#FFF",
                  borderLeft: `4px solid ${c[t.tp]}`,
                  color: "#1A1A2E",
                  padding: "12px 16px",
                  borderRadius: 10,
                  fontSize: 13,
                  boxShadow: "0 4px 20px rgba(0,0,0,0.12)",
                  animation: "slideUp 0.25s ease",
                  maxWidth: 400,
                }}
              >
                {t.m}
              </div>
            ))}
          </div>
        );
      }
      function Spinner({ size = 20, color = "#C8873A" }) {
        return (
          <div
            style={{
              width: size,
              height: size,
              border: `2.5px solid ${color}22`,
              borderTop: `2.5px solid ${color}`,
              borderRadius: "50%",
              animation: "spin 0.7s linear infinite",
              display: "inline-block",
            }}
          />
        );
      }
      function Modal({ title, children, onClose }) {
        return (
          <div
            style={{
              position: "fixed",
              inset: 0,
              background: "rgba(26,26,46,0.6)",
              zIndex: 1000,
              display: "flex",
              alignItems: "flex-end",
              justifyContent: "center",
            }}
          >
            <div
              style={{
                background: "#FFF",
                borderRadius: "20px 20px 0 0",
                padding: "24px 20px 32px",
                width: "100%",
                maxWidth: 560,
                maxHeight: "92vh",
                overflowY: "auto",
                animation: "slideUp 0.25s ease",
              }}
            >
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: 20,
                }}
              >
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 20,
                    color: "#1A1A2E",
                    letterSpacing: 1,
                  }}
                >
                  {title}
                </div>
                <button
                  onClick={onClose}
                  style={{
                    background: "#F0F0F5",
                    border: "none",
                    color: "#666",
                    width: 36,
                    height: 36,
                    borderRadius: "50%",
                    fontSize: 20,
                  }}
                >
                  ×
                </button>
              </div>
              {children}
            </div>
          </div>
        );
      }
      function Card({ children, style = {} }) {
        return (
          <div
            style={{
              background: "#FFF",
              borderRadius: 14,
              border: "1px solid #EBEBF5",
              boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
              ...style,
            }}
          >
            {children}
          </div>
        );
      }
      function Label({ children }) {
        return (
          <div
            style={{
              fontSize: 11,
              color: "#888",
              marginBottom: 5,
              letterSpacing: 0.5,
              textTransform: "uppercase",
              fontWeight: 600,
            }}
          >
            {children}
          </div>
        );
      }
      function Btn({
        children,
        onClick,
        variant = "primary",
        disabled,
        style = {},
      }) {
        const s = {
          primary: { background: "#C8873A", color: "#FFF", border: "none" },
          secondary: {
            background: "#F0F0F5",
            color: "#1A1A2E",
            border: "none",
          },
          danger: {
            background: "transparent",
            color: "#E74C3C",
            border: "1px solid #F5C0BB",
          },
          green: { background: "#27AE60", color: "#FFF", border: "none" },
        };
        return (
          <button
            onClick={onClick}
            disabled={disabled}
            style={{
              ...s[variant],
              borderRadius: 12,
              padding: "13px 18px",
              fontSize: 14,
              fontWeight: 700,
              opacity: disabled ? 0.5 : 1,
              ...style,
            }}
          >
            {children}
          </button>
        );
      }

      function AppLoginScreen({ onAuth, toast }) {
        const [view, setView] = useState("login");
        const [pw, setPw] = useState("");
        const [load, setLoad] = useState(false);
        const [otpSent, setOtpSent] = useState(false);
        const [otp, setOtp] = useState("");
        const [np, setNp] = useState("");
        const [cp, setCp] = useState("");
        const [rLoad, setRLoad] = useState(false);
        const login = async () => {
          if (!pw) return;
          setLoad(true);
          try {
            const r = await firebaseLogin(pw);
            if (r.valid) {
              sessionStorage.setItem(SESSION_KEY, "1");
              onAuth();
            } else {
              toast("Wrong password", "error");
              setPw("");
            }
          } catch (e) {
            // Save the exact error to our new local storage logger
            saveLog("Attempted Login", e);

            // Show the exact error on the screen in the toast popup
            toast(e.message || "Login Error - Check Logs", "error");
          }
          setLoad(false);
        };
        const sendOtp = async () => {
          setRLoad(true);
          try {
            const o = String(Math.floor(100000 + Math.random() * 900000));
            await db
              .doc("otps/appPassword")
              .set({
                otp: o,
                expiresAt: firebase.firestore.Timestamp.fromDate(
                  new Date(Date.now() + 600000),
                ),
              });
            const s = await getSettingsRaw();
            const r = await sendEmail("sendOtpEmail", {
              otp: o,
              barName: s.barName,
            });
            if (r.success) {
              setOtpSent(true);
              toast("OTP sent", "success");
            }
          } catch (e) {
            toast("Error", "error");
          }
          setRLoad(false);
        };
        const resetPw = async () => {
          if (!otp || !np || np !== cp || np.length < 4) {
            toast("Check inputs", "error");
            return;
          }
          setRLoad(true);
          try {
            const doc = await db.doc("otps/appPassword").get();
            if (!doc.exists) toast("No OTP", "error");
            else {
              const d = doc.data();
              if (Date.now() > d.expiresAt.toDate().getTime())
                toast("Expired", "error");
              else if (otp !== d.otp) toast("Invalid OTP", "error");
              else {
                await db
                  .doc("settings/appPassword")
                  .set(
                    {
                      key: "appPassword",
                      value: np,
                      updatedAt:
                        firebase.firestore.FieldValue.serverTimestamp(),
                    },
                    { merge: true },
                  );
                await db.doc("otps/appPassword").delete();
                toast("Reset! Login now.", "success");
                setView("login");
                setOtpSent(false);
                setOtp("");
                setNp("");
                setCp("");
              }
            }
          } catch (e) {
            toast("Error", "error");
          }
          setRLoad(false);
        };
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              minHeight: "100vh",
              background: "#F7F8FA",
              padding: 20,
            }}
          >
            <div
              style={{
                width: "100%",
                maxWidth: 360,
                animation: "slideUp 0.3s ease",
              }}
            >
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 36,
                    color: "#C8873A",
                    letterSpacing: 4,
                  }}
                >
                  Pushpam
                </div>
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 18,
                    color: "#C8873A88",
                    letterSpacing: 6,
                    marginBottom: 8,
                  }}
                >
                  A/C BAR
                </div>
              </div>
              <Card
                style={{
                  padding: 28,
                  boxShadow: "0 4px 24px rgba(0,0,0,0.06)",
                }}
              >
                {view === "login" ? (
                  <>
                    <div
                      style={{
                        fontFamily: "'Bebas Neue',cursive",
                        fontSize: 20,
                        color: "#1A1A2E",
                        letterSpacing: 2,
                      }}
                    >
                      WELCOME BACK
                    </div>
                    <p
                      style={{ fontSize: 12, color: "#888", marginBottom: 20 }}
                    >
                      Enter password
                    </p>
                    <div style={{ marginBottom: 16 }}>
                      <input
                        type="password"
                        value={pw}
                        onChange={(e) => setPw(e.target.value)}
                        onKeyDown={(e) => e.key === "Enter" && login()}
                        placeholder="Password"
                        style={{
                          fontSize: 16,
                          letterSpacing: 4,
                          textAlign: "center",
                        }}
                      />
                    </div>
                    <button
                      onClick={login}
                      disabled={load || !pw}
                      style={{
                        width: "100%",
                        padding: "15px 0",
                        background: load || !pw ? "#C8873A88" : "#C8873A",
                        border: "none",
                        borderRadius: 12,
                        color: "#FFF",
                        fontSize: 14,
                        fontWeight: 700,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        gap: 10,
                      }}
                    >
                      {load ? (
                        <>
                          <Spinner size={18} color="#FFF" /> Verifying...
                        </>
                      ) : (
                        "ENTER"
                      )}
                    </button>
                    <button
                      onClick={() => setView("reset")}
                      style={{
                        background: "none",
                        border: "none",
                        color: "#C8873A",
                        fontSize: 12,
                        width: "100%",
                        marginTop: 16,
                        textAlign: "center",
                        textDecoration: "underline",
                      }}
                    >
                      Forgot password?
                    </button>
                  </>
                ) : (
                  <>
                    <button
                      onClick={() => {
                        setView("login");
                        setOtpSent(false);
                      }}
                      style={{
                        background: "none",
                        border: "none",
                        color: "#C8873A",
                        fontSize: 13,
                        marginBottom: 14,
                        padding: 0,
                      }}
                    >
                      ← Back
                    </button>
                    <div
                      style={{
                        fontFamily: "'Bebas Neue',cursive",
                        fontSize: 20,
                        color: "#1A1A2E",
                        letterSpacing: 2,
                      }}
                    >
                      RESET PASSWORD
                    </div>
                    <p
                      style={{ fontSize: 12, color: "#888", marginBottom: 20 }}
                    >
                      OTP to registered email.
                    </p>
                    {!otpSent ? (
                      <button
                        onClick={sendOtp}
                        disabled={rLoad}
                        style={{
                          width: "100%",
                          padding: "14px 0",
                          background: rLoad ? "#C8873A88" : "#C8873A",
                          border: "none",
                          borderRadius: 12,
                          color: "#FFF",
                          fontWeight: 700,
                        }}
                      >
                        {rLoad ? "Sending..." : "Send OTP"}
                      </button>
                    ) : (
                      <div
                        style={{
                          display: "flex",
                          flexDirection: "column",
                          gap: 12,
                        }}
                      >
                        <div
                          style={{
                            background: "#F0FBF0",

      function PinScreen({ onUnlock, toast }) {
        const [pin, setPin] = useState("");
        const [load, setLoad] = useState(false);
        const [fLoad, setFLoad] = useState(false);
        const [sent, setSent] = useState(false);
        const unlock = async () => {
          if (!pin) return;
          setLoad(true);
          try {
            const r = await firebaseVerifyPin(pin);
            if (r.valid) onUnlock();
            else {
              toast("Wrong PIN", "error");
              setPin("");
            }
          } catch (e) {
            toast("Error", "error");
          }
          setLoad(false);
        };
        const forgot = async () => {
          setFLoad(true);
          try {
            const d = await db.doc("settings/managerPin").get();
            const p = d.exists ? d.data().value : "1234";
            const s = await getSettingsRaw();
            const r = await sendEmail("sendResetPinEmail", {
              pin: p,
              barName: s.barName,
            });
            if (r.success) {
              setSent(true);
              toast("PIN sent", "success");
            }
          } catch (e) {
            toast("Error", "error");
          }
          setFLoad(false);
        };
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              minHeight: "calc(100vh - 58px)",
              padding: 20,
            }}
          >
            <Card
              style={{
                padding: 36,
                width: "100%",
                maxWidth: 340,
                textAlign: "center",
              }}
            >

                  fontFamily: "'Bebas Neue',cursive",
                  fontSize: 28,
                  color: "#1A1A2E",
                  marginBottom: 6,
                }}
              >
                MANAGER ACCESS
              </div>
              <p style={{ color: "#888", fontSize: 13, marginBottom: 24 }}>
                Enter PIN
              </p>
              <input

                  textAlign: "center",

              {!sent ? (
                <button
                  onClick={forgot}
                  disabled={fLoad}
                  style={{
                    background: "none",
                    border: "none",
                    color: "#C8873A",
                    fontSize: 13,

                    padding: 0,
                    opacity: fLoad ? 0.5 : 1,

                >
                  {fLoad ? "Sending..." : "Forgot PIN?"}

      function ServerApp({ inv, tables, settings, toast, onRefresh }) {
        const [table, setTable] = useState(tables[0] || "T1");
        const [cName, setCName] = useState("");
        const [cPhone, setCPhone] = useState("");
        const [cat, setCat] = useState("All");
        const [cart, setCart] = useState([]);
        const [showCart, setShowCart] = useState(false);
        const filtered =
          cat === "All" ? inv : inv.filter((i) => i.category === cat);
        const addToCart = (item, qty, unit) => {
          const pB =
            item.priceBottle ||
            calcBottlePrice(item.price30ml, item.mlPerBottle);
          const p30 = item.price30ml || calcPer30ml(pB, item.mlPerBottle);
          const price =
            unit === "small" ? p30 : unit === "large" ? p30 * 2 : pB;
          setCart((p) => [
            ...p,
            {
              itemId: item.id,
              itemName: item.name,
              qty,
              unit,
              unitPrice: price,
              lineTotal: price * qty,
              category: item.category,
              mlPerBottle: item.mlPerBottle,
            },
          ]);
          toast(item.name + " added", "success");
        };
        const cartSub = cart.reduce((s, c) => s + c.lineTotal, 0);
        const handleOrder = async () => {
          if (!cart.length) return;
          try {
            const items = cart.map((c) => ({
              itemId: c.itemId,
              itemName: c.itemName,
              qty: c.qty,
              unit: c.unit,
              unitPrice: c.unitPrice,
              lineTotal: c.lineTotal,
              category: c.category,
              mlPerBottle: c.mlPerBottle,
            }));
            await saveOrder({
              tableNumber: table,
              customerName: cName,
              customerPhone: cPhone,
              items,
            });
            toast("Order placed!", "success");
            setCart([]);
            setShowCart(false);
            onRefresh();
          } catch (e) {
            toast("Error: " + e.message, "error");
          }

        return (
          <div>
            <div
              style={{
                display: "flex",
                gap: 8,
                marginBottom: 16,
                overflowX: "auto",
              }}
            >
              {tables.map((t) => (
                <button

                  onClick={() => setTable(t)}

                    border: "none",
                    borderRadius: 10,
                    padding: "10px 18px",
                    fontSize: 14,
                    fontWeight: 700,
                    whiteSpace: "nowrap",

                >
                  {t}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>

                value={cName}
                onChange={(e) => setCName(e.target.value)}
                placeholder="Customer Name"

              />
              <input

                placeholder="Phone"
                style={{ width: 140 }}
              />
            </div>
            <div
              style={{
                display: "flex",
                gap: 6,
                overflowX: "auto",
                marginBottom: 16,
              }}
            >
              {CATEGORIES.map((c) => (
                <button
                  key={c}
                  onClick={() => setCat(c)}
                  style={{
                    background: cat === c ? "#C8873A" : "#F0F0F5",
                    color: cat === c ? "#FFF" : "#666",
                    border: "none",
                    borderRadius: 20,
                    padding: "8px 16px",
                    fontSize: 12,
                    fontWeight: 700,
                    whiteSpace: "nowrap",
                  }}
                >
                  {c}
                </button>
              ))}

                />
              ))}
            </div>
            {cart.length > 0 && (
              <div
                style={{
                  position: "fixed",
                  bottom: 0,
                  left: 0,
                  right: 0,
                  background: "#FFF",
                  padding: "16px",

                >
                  ⚠ LOW STOCK ({bottlesToDisplay(item.qtyAvailable)})
                </div>
              )}
            </div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 3 }}>
              <span
                style={{
                  fontFamily: "'JetBrains Mono',monospace",
                  fontSize: 14,
                  color: "#C8873A",
                  fontWeight: 700,
                }}
              >
                ₹{price}
              </span>
              <span style={{ fontSize: 10, color: "#aaa" }}>{pLbl}</span>
            </div>
            {isLiq && (
              <select
                value={unit}
                onChange={(e) => setUnit(e.target.value)}
                style={{ fontSize: 12, padding: "7px 8px" }}
              >
                <option value="small">Small 30ml — ₹{p30}</option>
                <option value="large">Large 60ml — ₹{p30 * 2}</option>
                <option value="bottle">Bottle — ₹{pB}</option>
              </select>
            )}
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <button
                onClick={() => setQty((q) => Math.max(1, q - 1))}
                style={{
                  background: "#F0F0F5",
                  border: "none",
                  width: 36,
                  height: 36,
                  borderRadius: 8,
                  fontSize: 18,
                  fontWeight: 700,
                }}
              >
                −
              </button>
              <span
                style={{
                  fontFamily: "'JetBrains Mono',monospace",
                  fontSize: 15,
                  flex: 1,
                  textAlign: "center",
                  fontWeight: 600,
                }}
              >
                {qty}
              </span>
              <button
                onClick={() => setQty((q) => q + 1)}
                style={{
                  background: "#F0F0F5",
                  border: "none",
                  width: 36,
                  height: 36,
                  borderRadius: 8,
                  fontSize: 18,
                  fontWeight: 700,
                }}
              >
                +
              </button>
              <button
                onClick={() => {
                  onAdd(item, qty, unit);
                  setQty(1);
                }}
                disabled={available <= 0}
                style={{
                  background: available <= 0 ? "#E0E0EE" : "#C8873A",
                  border: "none",
                  color: "#FFF",
                  padding: "8px 14px",
                  borderRadius: 8,
                  fontSize: 13,
                  fontWeight: 700,
                  minHeight: 36,
                }}
              >
                {available <= 0 ? "OUT" : "ADD"}
              </button>
            </div>
          </Card>
        );
      }

      function ManagerDashboard({ inv, tables, settings, toast, onRefresh }) {
        const [tab, setTab] = useState("inventory");
        const [showAdd, setShowAdd] = useState(false);
        const [showReport, setShowReport] = useState(false);
        const [orders, setOrders] = useState([]);
        const [bills, setBills] = useState([]);
        useEffect(() => {
          if (tab === "orders")
            getOrders().then((d) => setOrders(d.map(mapOrderRow).flat()));
          if (tab === "bills")
            getBills().then((d) => setBills(d.map(mapBillRow)));
        }, [tab]);
        return (
          <div>
            <div
              style={{
                display: "flex",
                gap: 8,
                marginBottom: 20,
                overflowX: "auto",
              }}
            >
              {["inventory", "orders", "bills", "settings"].map((t) => (
                <button
                  key={t}
                  onClick={() => setTab(t)}
                  style={{
                    background: tab === t ? "#1A1A2E" : "#F0F0F5",
                    color: tab === t ? "#FFF" : "#666",
                    border: "none",
                    borderRadius: 10,
                    padding: "10px 18px",
                    fontSize: 12,
                    fontWeight: 700,
                    textTransform: "uppercase",
                    whiteSpace: "nowrap",
                  }}
                >
                  {t}
                </button>
              ))}
            </div>
            {tab === "inventory" && (
              <>
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    marginBottom: 16,
                  }}
                >
                  <div
                    style={{
                      fontFamily: "'Bebas Neue',cursive",
                      fontSize: 22,
                      color: "#1A1A2E",
                    }}
                  >
                    INVENTORY ({inv.length})
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn
                      onClick={() => setShowReport(true)}
                      variant="secondary"
                    >
                      📅 Report
                    </Btn>
                    <Btn onClick={() => setShowAdd(true)}>+ Add Item</Btn>
                  </div>
                </div>
                {showReport && (
                  <InventoryDateRangeReport
                    onClose={() => setShowReport(false)}
                    toast={toast}
                  />
                )}
                {showAdd && (
                  <AddItemModal
                    onClose={() => setShowAdd(false)}
                    toast={toast}
                    onDone={() => {
                      setShowAdd(false);
                      onRefresh();
                    }}
                  />
                )}
                {inv.map((item) => (
                  <ManageInvRow
                    key={item.id}
                    item={item}
                    toast={toast}
                    onRefresh={onRefresh}
                  />
                ))}
              </>
            )}
            {tab === "orders" && (
              <>
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 22,
                    color: "#1A1A2E",
                    marginBottom: 16,
                  }}
                >
                  OPEN ORDERS
                </div>
                {orders
                  .filter((o) => o.status === "open")
                  .map((o, i) => (
                    <Card key={i} style={{ padding: 12, marginBottom: 10 }}>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                        }}
                      >
                        <div>
                          <b>Table {o.tableNumber}</b> - {o.itemName} × {o.qty}{" "}
                          {o.unit}
                        </div>
                        <div style={{ color: "#C8873A", fontWeight: 700 }}>
                          ₹{o.lineTotal}
                        </div>
                      </div>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "flex-end",
                          marginTop: 8,
                          gap: 8,
                        }}
                      >
                        <Btn
                          variant="green"
                          style={{ padding: "8px 14px", fontSize: 12 }}
                          onClick={async () => {
                            await updateOrderStatus(o.tableNumber, "served");
                            toast("Served", "success");
                            const d = await getOrders();
                            setOrders(d.map(mapOrderRow).flat());
                          }}
                        >
                          Mark Served
                        </Btn>
                        <Btn
                          variant="danger"
                          style={{ padding: "8px 14px", fontSize: 12 }}
                          onClick={async () => {
                            await updateOrderStatus(o.tableNumber, "cancelled");
                            toast("Cancelled", "success");
                            const d = await getOrders();
                            setOrders(d.map(mapOrderRow).flat());
                          }}
                        >
                          Cancel
                        </Btn>
                      </div>
                    </Card>
                  ))}
              </>
            )}
            {tab === "bills" && (
              <>
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 22,
                    color: "#1A1A2E",
                    marginBottom: 16,
                  }}
                >
                  RECENT BILLS
                </div>
                {bills.slice(0, 20).map((b) => (
                  <Card
                    key={b.billId}
                    style={{ padding: 12, marginBottom: 10 }}
                  >
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        alignItems: "center",
                      }}
                    >
                      <div>
                        <b>
                          {b.customerName || "Guest"} - Table {b.tableNumber}
                        </b>
                        <div style={{ fontSize: 11, color: "#888" }}>
                          {b.dateTime}
                        </div>
                      </div>
                      <div
                        style={{
                          fontFamily: "'JetBrains Mono',monospace",
                          fontSize: 16,
                          color: "#27AE60",
                          fontWeight: 700,
                        }}
                      >
                        ₹{(+b.total).toFixed(0)}
                      </div>
                    </div>
                  </Card>
                ))}
              </>
            )}
            {tab === "settings" && (
              <SettingsPanel
                settings={settings}
                toast={toast}
                onRefresh={onRefresh}
              />
            )}
          </div>
        );
      }

      function ManageInvRow({ item, toast, onRefresh }) {
        const [edit, setEdit] = useState(false);
        const [form, setForm] = useState({ ...item });
        const save = async () => {
          try {
            await updateInventoryItem(item.id, form);
            toast("Updated", "success");
            setEdit(false);
            onRefresh();
          } catch (e) {
            toast("Error", "error");
          }
        };
        const del = async () => {
          if (!confirm("Delete " + item.name + "?")) return;
          try {
            await deleteInventoryItem(item.id);
            toast("Deleted", "success");
            onRefresh();
          } catch (e) {
            toast("Error", "error");
          }
        };
        return (
          <Card style={{ padding: 12, marginBottom: 10 }}>
            {edit ? (
              <div
                style={{ display: "flex", flexDirection: "column", gap: 10 }}
              >
                <input
                  value={form.name}
                  onChange={(e) => setForm({ ...form, name: e.target.value })}
                  placeholder="Name"
                />
                <select
                  value={form.category}
                  onChange={(e) =>
                    setForm({ ...form, category: e.target.value })
                  }
                >
                  {CATEGORIES.filter((c) => c !== "All").map((c) => (
                    <option key={c}>{c}</option>
                  ))}
                </select>
                <div style={{ display: "flex", gap: 10 }}>
                  <input
                    type="number"
                    value={form.price30ml}
                    onChange={(e) =>
                      setForm({ ...form, price30ml: e.target.value })
                    }
                    placeholder="Price 30ml"
                  />
                  <input
                    type="number"
                    value={form.priceBottle}
                    onChange={(e) =>
                      setForm({ ...form, priceBottle: e.target.value })
                    }
                    placeholder="Price Bottle"
                  />
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <input
                    type="number"
                    value={form.qtyAvailable}
                    onChange={(e) =>
                      setForm({ ...form, qtyAvailable: e.target.value })
                    }
                    placeholder="Qty Bottles"
                  />
                  <input
                    type="number"
                    value={form.lowStockThreshold}
                    onChange={(e) =>
                      setForm({ ...form, lowStockThreshold: e.target.value })
                    }
                    placeholder="Low Thresh"
                  />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={save} style={{ flex: 1 }}>
                    Save
                  </Btn>
                  <Btn
                    variant="secondary"
                    onClick={() => setEdit(false)}
                    style={{ flex: 1 }}
                  >
                    Cancel
                  </Btn>
                </div>
              </div>
            ) : (
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <div>
                  <div style={{ fontWeight: 600 }}>
                    {item.name}{" "}
                    <span style={{ color: "#888", fontSize: 12 }}>
                      {item.category}
                    </span>
                  </div>
                  <div style={{ fontSize: 12, color: "#888" }}>
                    Stock: {bottlesToDisplay(item.qtyAvailable)} | 30ml: ₹
                    {item.price30ml} | Btl: ₹{item.priceBottle}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn
                    variant="secondary"
                    onClick={() => setEdit(true)}
                    style={{ padding: "8px 12px", fontSize: 12 }}
                  >
                    Edit
                  </Btn>
                  <Btn
                    variant="danger"
                    onClick={del}
                    style={{ padding: "8px 12px", fontSize: 12 }}
                  >
                    Del
                  </Btn>
                </div>
              </div>
            )}
          </Card>
        );
      }

      function AddItemModal({ onClose, toast, onDone }) {
        const [form, setForm] = useState({
          name: "",
          category: "Liquor",
          price30ml: "",
          priceBottle: "",
          mlPerBottle: 750,
          qtyAvailable: 1,
          lowStockThreshold: 2,
        });
        const [img, setImg] = useState(null);
        const [uploading, setUploading] = useState(false);
        const handleSave = async () => {
          if (!form.name) {
            toast("Name required", "error");
            return;
          }
          setUploading(true);
          try {
            let url = "";
            if (img) {
              url = await uploadToGithub(img, "img-" + Date.now());
            }
            await addInventoryItem({ ...form, imageUrl: url });
            toast("Added", "success");
            onDone();
          } catch (e) {
            if (e.duplicate) toast("Duplicate name", "error");
            else toast("Error", "error");
          }
          setUploading(false);
        };
        return (
          <Modal title="Add Inventory Item" onClose={onClose}>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <input
                value={form.name}
                onChange={(e) => setForm({ ...form, name: e.target.value })}
                placeholder="Item Name *"
              />
              <select
                value={form.category}
                onChange={(e) => setForm({ ...form, category: e.target.value })}
              >
                {CATEGORIES.filter((c) => c !== "All").map((c) => (
                  <option key={c}>{c}</option>
                ))}
              </select>
              <input
                type="file"
                accept="image/*"
                onChange={(e) => setImg(e.target.files[0])}
                style={{ padding: 8 }}
              />
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  type="number"
                  value={form.price30ml}
                  onChange={(e) =>
                    setForm({ ...form, price30ml: e.target.value })
                  }
                  placeholder="Price 30ml"
                />
                <input
                  type="number"
                  value={form.priceBottle}
                  onChange={(e) =>
                    setForm({ ...form, priceBottle: e.target.value })
                  }
                  placeholder="Price Bottle"
                />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  type="number"
                  value={form.mlPerBottle}
                  onChange={(e) =>
                    setForm({ ...form, mlPerBottle: e.target.value })
                  }
                  placeholder="ML per Bottle"
                />
                <input
                  type="number"
                  value={form.qtyAvailable}
                  onChange={(e) =>
                    setForm({ ...form, qtyAvailable: e.target.value })
                  }
                  placeholder="Initial Qty"
                />
              </div>
              <Btn onClick={handleSave} disabled={uploading}>
                {uploading ? "Uploading Image..." : "Add Item"}
              </Btn>
            </div>
          </Modal>
        );
      }

      function SettingsPanel({ settings, toast, onRefresh }) {
        const [form, setForm] = useState({ ...settings });
        const [load, setLoad] = useState(false);
        const save = async () => {
          setLoad(true);
          try {
            await saveSettings(form);
            toast("Saved", "success");
            onRefresh();
          } catch (e) {
            toast("Error", "error");
          }
          setLoad(false);
        };
        return (
          <div style={{ maxWidth: 500 }}>
            <div
              style={{
                fontFamily: "'Bebas Neue',cursive",
                fontSize: 22,
                color: "#1A1A2E",
                marginBottom: 16,
              }}
            >
              SETTINGS
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div>
                <Label>Bar Name</Label>
                <input
                  value={form.barName || ""}
                  onChange={(e) =>
                    setForm({ ...form, barName: e.target.value })
                  }
                />
              </div>
              <div>
                <Label>Address</Label>
                <input
                  value={form.barAddress || ""}
                  onChange={(e) =>
                    setForm({ ...form, barAddress: e.target.value })
                  }
                />
              </div>
              <div>
                <Label>GST Number</Label>
                <input
                  value={form.gstNumber || ""}
                  onChange={(e) =>
                    setForm({ ...form, gstNumber: e.target.value })
                  }
                />
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <Label>GST Rate (%)</Label>
                  <input
                    type="number"
                    value={form.gstRate || 18}
                    onChange={(e) =>
                      setForm({ ...form, gstRate: e.target.value })
                    }
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <Label>GST Inclusive?</Label>
                  <select
                    value={form.gstInclusive ? "yes" : "no"}
                    onChange={(e) =>
                      setForm({
                        ...form,
                        gstInclusive: e.target.value === "yes",
                      })
                    }
                  >
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                  </select>
                </div>
              </div>
              <div>
                <Label>Tables (comma separated)</Label>
                <input
                  value={form.tables || ""}
                  onChange={(e) => setForm({ ...form, tables: e.target.value })}
                />
              </div>
              <div style={{ borderTop: "1px solid #EBEBF5", paddingTop: 14 }}>
                <Label>Manager PIN</Label>
                <input
                  value={form.managerPin || ""}
                  onChange={(e) =>
                    setForm({ ...form, managerPin: e.target.value })
                  }
                />
              </div>
              <div>
                <Label>App Password</Label>
                <input
                  type="password"
                  value={form.appPassword || ""}
                  onChange={(e) =>
                    setForm({ ...form, appPassword: e.target.value })
                  }
                />
              </div>
              <Btn onClick={save} disabled={load} style={{ marginTop: 10 }}>
                {load ? "Saving..." : "Save Settings"}
              </Btn>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>

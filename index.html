<html lang="en">
  <head>
    <meta charset="UTF-8" />

      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

      src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"
      crossorigin

    <script
      src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        doc,
        getDoc,
        getDocs,
        setDoc,
        addDoc,
        updateDoc,
        deleteDoc,
        query,
        where,
        orderBy,
        serverTimestamp,
        increment,
        writeBatch,
        Timestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyByXtsxQkXMbVw-a7hqUyxjwDXJjOVdhQg",
        authDomain: "pushpam-bar-pos.firebaseapp.com",
        projectId: "pushpam-bar-pos",
        storageBucket: "pushpam-bar-pos.firebasestorage.app",
        messagingSenderId: "477169972182",
        appId: "1:477169972182:web:c92372bb2d8af057deaa77",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // Test: sign in anonymously and try a Firestore read
      signInAnonymously(auth)
        .then((cred) => {
          console.log("✅ Firebase Auth OK — UID:", cred.user.uid);
          // Now test Firestore
          return getDoc(doc(db, "settings", "main"));
        })
        .then((snap) => {
          console.log("✅ Firestore read OK — exists:", snap.exists());
        })
        .catch((err) => {
          console.error("❌ Firebase error:", err.code, err.message);
          const el = document.getElementById("vb-err");
          const init = document.getElementById("vb-init");
          if (el && init) {
            init.style.display = "flex";
            el.style.display = "block";
            el.textContent = `Firebase: ${err.code} — ${err.message}`;
          }
        });
      // ── ID GENERATION ─────────────────────────────────────────────
      async function getNextId(counterName, prefix, padLen = 4) {
        const ref = doc(db, "counters", counterName);
        const snap = await getDoc(ref);
        const current = snap.exists() ? snap.data().count || 0 : 0;
        const next = current + 1;
        await setDoc(ref, { count: next }, { merge: true });
        return `${prefix}-${String(next).padStart(padLen, "0")}`;
      }

      // ── SETTINGS ──────────────────────────────────────────────────
      async function getSettings() {
        const snap = await getDoc(doc(db, "settings", "main"));
        return snap.exists() ? snap.data() : {};
      }
      async function saveSettings(data) {
        const existing = await getSettings();
        const merged = { ...existing, ...data };
        if (merged.managerPin === "••••")
          merged.managerPin = existing.managerPin || "1234";
        if (merged.appPassword === "••••")
          merged.appPassword = existing.appPassword || "2121";
        await setDoc(doc(db, "settings", "main"), merged);
        return { saved: true };
      }

      // ── AUTH ──────────────────────────────────────────────────────
      async function verifyAppPassword(password) {
        const s = await getSettings();
        return { valid: String(password) === String(s.appPassword || "2121") };
      }
      async function verifyPin(pin) {
        const s = await getSettings();
        return { valid: String(pin) === String(s.managerPin || "1234") };
      }

      // OTP stored in Firestore "otps/appPassword"
      async function sendAppPasswordOtp() {
        const s = await getSettings();
        const otp = String(Math.floor(100000 + Math.random() * 900000));
        const expiry = Date.now() + 10 * 60 * 1000;
        await setDoc(doc(db, "otps", "appPassword"), { otp, expiry });
        // Call GAS email service
        await gasEmail("sendOtpEmail", {
          otp,
          barName: s.barName || "Pushpam A/C Bar",
        });
        return { sent: true };
      }
      async function resetAppPassword(otp, newPassword) {
        const otpDoc = await getDoc(doc(db, "otps", "appPassword"));
        if (!otpDoc.exists())
          return { reset: false, reason: "No OTP was requested" };
        const { otp: stored, expiry } = otpDoc.data();
        if (Date.now() > expiry)
          return { reset: false, reason: "OTP has expired" };
        if (String(otp) !== String(stored))
          return { reset: false, reason: "Invalid OTP" };
        const s = await getSettings();
        await saveSettings({
          ...s,
          appPassword: String(newPassword),
          appOtp: "",
          appOtpExpiry: "",
        });
        await deleteDoc(doc(db, "otps", "appPassword"));
        return { reset: true };
      }
      async function sendResetPin() {
        const s = await getSettings();
        await gasEmail("sendResetPinEmail", {
          pin: s.managerPin || "1234",
          barName: s.barName || "Pushpam A/C Bar",
        });
        return { sent: true };
      }

      // ── GAS EMAIL HELPER ──────────────────────────────────────────
      const GAS_EMAIL_URL =
        "https://script.google.com/macros/s/AKfycbwyfjwqf90RfoWzLWub-mScxDEdCf34RfUUv82RPVWx4jezlYLNZdRITWoPEBhjPyV3/exec";
      async function gasEmail(action, body) {
        const url = `${GAS_EMAIL_URL}?action=${action}&body=${encodeURIComponent(JSON.stringify(body))}`;
        const res = await fetch(url);
        return res.json();
      }

      // ── INVENTORY ─────────────────────────────────────────────────
      async function getInventory() {
        const snap = await getDocs(
          query(collection(db, "inventory"), where("active", "==", true)),
        );
        return snap.docs.map((d) => ({ firestoreId: d.id, ...d.data() }));
      }
      async function addInventoryItem(body) {
        const prefixMap = {
          Liquor: "LQ",
          Beer: "BR",
          "Soft Drinks": "SD",
          Cocktails: "CK",
          Mocktails: "MK",
        };
        const prefix = prefixMap[body.category] || "IT";
        const id = await getNextId(prefix.toLowerCase() + "Count", prefix);
        const now = new Date();
        const payload = {
          id,
          name: body.name,
          category: body.category,
          imageUrl: body.imageUrl || "",
          price30ml: +body.price30ml || 0,
          priceBottle: +body.priceBottle || 0,
          mlPerBottle: +body.mlPerBottle || 750,
          qtyAvailable: +body.qtyAvailable || 1,
          lowStockThreshold: +body.lowStockThreshold || 2,
          active: true,
          createdAt: serverTimestamp(),
          // Human-readable for the log report
          addedDate: now.toLocaleDateString("en-IN"),
          addedTime: now.toLocaleTimeString("en-IN"),
          addedDateISO: now.toISOString(),
        };
        const ref = await addDoc(collection(db, "inventory"), payload);
        // Log to inventoryLog collection
        await addDoc(collection(db, "inventoryLog"), {
          ...payload,
          firestoreId: ref.id,
          action: "add",
          loggedAt: serverTimestamp(),
          loggedDateISO: now.toISOString(),
          loggedDate: now.toLocaleDateString("en-IN"),
          loggedTime: now.toLocaleTimeString("en-IN"),
        });
        return { id, firestoreId: ref.id };
      }
      async function updateInventoryItem(body) {
        const snap = await getDocs(
          query(collection(db, "inventory"), where("id", "==", body.id)),
        );
        if (snap.empty) return { updated: false };
        const ref = snap.docs[0].ref;
        const updates = {};
        if (body.name !== undefined) updates.name = body.name;
        if (body.category !== undefined) updates.category = body.category;
        if (body.imageUrl !== undefined) updates.imageUrl = body.imageUrl;
        if (body.price30ml !== undefined) updates.price30ml = +body.price30ml;
        if (body.priceBottle !== undefined)
          updates.priceBottle = +body.priceBottle;
        if (body.mlPerBottle !== undefined)
          updates.mlPerBottle = +body.mlPerBottle;
        if (body.qtyAvailable !== undefined)
          updates.qtyAvailable = +body.qtyAvailable;
        if (body.lowStockThreshold !== undefined)
          updates.lowStockThreshold = +body.lowStockThreshold;
        updates.updatedAt = serverTimestamp();
        await updateDoc(ref, updates);
        // Log update
        const now = new Date();
        await addDoc(collection(db, "inventoryLog"), {
          ...updates,
          id: body.id,
          firestoreId: snap.docs[0].id,
          action: "update",
          loggedAt: serverTimestamp(),
          loggedDateISO: now.toISOString(),
          loggedDate: now.toLocaleDateString("en-IN"),
          loggedTime: now.toLocaleTimeString("en-IN"),
        });
        return { updated: true };
      }
      async function deleteInventoryItem(body) {
        const snap = await getDocs(
          query(collection(db, "inventory"), where("id", "==", body.id)),
        );
        if (snap.empty) return { deleted: false };
        await updateDoc(snap.docs[0].ref, {
          active: false,
          updatedAt: serverTimestamp(),
        });
        return { deleted: true };
      }
      async function adjustStock(body) {
        const snap = await getDocs(
          query(collection(db, "inventory"), where("id", "==", body.id)),
        );
        if (snap.empty) return { newQty: 0 };
        const data = snap.docs[0].data();
        const newQty = Math.max(
          0,
          (data.qtyAvailable || 0) + body.deltaBottles,
        );
        await updateDoc(snap.docs[0].ref, {
          qtyAvailable: newQty,
          updatedAt: serverTimestamp(),
        });
        return { newQty };
      }

      // ── INVENTORY LOG ─────────────────────────────────────────────
      async function getInventoryLog() {
        const snap = await getDocs(
          query(collection(db, "inventoryLog"), orderBy("loggedAt", "desc")),
        );
        return snap.docs.map((d) => ({ firestoreId: d.id, ...d.data() }));
      }

      // ── ORDERS ────────────────────────────────────────────────────
      async function getOrders() {
        const snap = await getDocs(collection(db, "orders"));
        return snap.docs.map((d) => ({ firestoreId: d.id, ...d.data() }));
      }

      function calcBottlesUsed(item) {
        if (["Liquor", "Beer"].includes(item.category)) {
          if (item.unit === "bottle") return item.qty;
          const mlPerShot = item.unit === "large" ? 60 : 30;
          return (item.qty * mlPerShot) / (item.mlPerBottle || 750);
        }
        return item.qty;
      }

      async function applyInventoryDeltas(lines, sign, db) {
        if (!lines || !lines.length) return;
        const lowStockAlerts = [];
        for (const item of lines) {
          if (!item.qty) continue;
          const snap = await getDocs(
            query(collection(db, "inventory"), where("id", "==", item.itemId)),
          );
          if (snap.empty) continue;
          const data = snap.docs[0].data();
          const bottlesUsed = calcBottlesUsed({
            ...item,
            mlPerBottle: data.mlPerBottle || 750,
          });
          const currentQty = data.qtyAvailable || 0;
          const newQty = Math.max(0, currentQty + bottlesUsed * sign);
          await updateDoc(snap.docs[0].ref, { qtyAvailable: newQty });
          const lowThreshold = data.lowStockThreshold || 2;
          if (sign < 0 && newQty <= lowThreshold && currentQty > lowThreshold) {
            lowStockAlerts.push({
              id: data.id,
              name: data.name,
              category: data.category,
              remainingBottles: newQty,
              threshold: lowThreshold,
            });
          }
        }
        if (lowStockAlerts.length) {
          const s = await getSettings();
          gasEmail("sendLowStockEmail", {
            alerts: lowStockAlerts,
            barName: s.barName || "Pushpam A/C Bar",
          }).catch(() => {});
        }
      }

      async function saveOrder(body) {
        const newRows = Array.isArray(body.orders) ? body.orders : [body];
        if (body.tableNumber) {
          // Find and remove existing open orders for this table
          const existing = await getDocs(
            query(
              collection(db, "orders"),
              where("tableNumber", "==", body.tableNumber),
              where("status", "==", "open"),
            ),
          );
          const prevLines = {};
          existing.docs.forEach((d) => {
            const o = d.data();
            const key = `${o.itemId}-${o.unit}`;
            if (!prevLines[key])
              prevLines[key] = {
                itemId: o.itemId,
                unit: o.unit,
                qty: 0,
                category: o.category,
              };
            prevLines[key].qty += o.qty || 0;
          });
          // Batch delete old open orders
          const batch = writeBatch(db);
          existing.docs.forEach((d) => batch.delete(d.ref));
          await batch.commit();
          // Restore stock from previous open orders
          await applyInventoryDeltas(Object.values(prevLines), +1, db);
        }
        // Apply deduction from new orders
        const newLines = {};
        newRows.forEach((o) => {
          const key = `${o.itemId}-${o.unit}`;
          if (!newLines[key])
            newLines[key] = {
              itemId: o.itemId,
              unit: o.unit,
              qty: 0,
              category: o.category,
            };
          newLines[key].qty += o.qty || 0;
        });
        await applyInventoryDeltas(Object.values(newLines), -1, db);
        // Write new order docs
        const batch2 = writeBatch(db);
        for (const o of newRows) {
          const ref = doc(collection(db, "orders"));
          batch2.set(ref, { ...o, createdAt: serverTimestamp() });
        }
        await batch2.commit();
        return { saved: newRows.length };
      }

      async function updateOrderStatus(body) {
        const snap = await getDocs(
          query(
            collection(db, "orders"),
            where("tableNumber", "==", body.tableNumber),
            where("status", "==", "open"),
          ),
        );
        const batch = writeBatch(db);
        snap.docs.forEach((d) =>
          batch.update(d.ref, { status: body.newStatus }),
        );
        await batch.commit();
        return { updated: snap.docs.length };
      }

      // ── BILLS ─────────────────────────────────────────────────────
      async function getBills() {
        const snap = await getDocs(
          query(collection(db, "bills"), orderBy("createdAt", "asc")),
        );
        return snap.docs.map((d) => ({ firestoreId: d.id, ...d.data() }));
      }
      async function saveBill(body) {
        await addDoc(collection(db, "bills"), {
          ...body,
          createdAt: serverTimestamp(),
        });
        return { saved: true };
      }

      // ── EXPOSE TO WINDOW for React app ────────────────────────────
      window.DB = {
        getSettings,
        saveSettings,
        verifyAppPassword,
        verifyPin,
        sendAppPasswordOtp,
        resetAppPassword,
        sendResetPin,
        getInventory,
        addInventoryItem,
        updateInventoryItem,
        deleteInventoryItem,
        adjustStock,
        getInventoryLog,
        getOrders,
        saveOrder,
        updateOrderStatus,
        getBills,
        saveBill,
      };
      window._DB_READY = true;
      document.dispatchEvent(new Event("db-ready"));
    </script>
    <style>

      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;

      html,
      body,

        height: 100%;

      body {
        background: #f7f8fa;

      ::-webkit-scrollbar {

      ::-webkit-scrollbar-track {

      ::-webkit-scrollbar-thumb {

      }
    </style>

  <body>

      <div
        id="vb-init"
        style="
          display: flex;

    <script type="text/babel">
      const { useState, useCallback, useMemo, useEffect, useRef } = React;

      const SESSION_KEY = "pushpam_app_auth";

      const DEFAULT_SETTINGS = {
        barName: "Pushpam A/C Bar",
        barAddress: "",
        gstNumber: "",
        gstRate: 18,
        gstInclusive: false,
        tables: "T1,T2,T3,T4,T5,T6,T7,T8",
        currency: "₹",
        githubOwner: "",
        githubRepo: "",
        githubToken: "",
        logoPath: "",
      };

      const CATEGORIES = [
        "All",
        "Liquor",
        "Beer",
        "Soft Drinks",
        "Cocktails",
        "Mocktails",
      ];
      const LIQUOR_CATS = ["Liquor", "Beer"];

      // Wait for Firebase to initialise
      function useDB() {
        const [ready, setReady] = useState(!!window._DB_READY);
        useEffect(() => {
          if (window._DB_READY) return;
          const handler = () => setReady(true);
          document.addEventListener("db-ready", handler);
          return () => document.removeEventListener("db-ready", handler);
        }, []);
        return ready ? window.DB : null;
      }

      function calcBottlePrice(price30ml, mlPerBottle) {
        const ml = +mlPerBottle || 750;
        return Math.round((ml / 30) * +price30ml);
      }
      function calcPer30ml(priceBottle, mlPerBottle) {
        const ml = +mlPerBottle || 750;
        return Math.round((+priceBottle / (ml / 30)) * 100) / 100;
      }
      function cartLineBottles(unit, qty, mlPerBottle) {
        if (unit === "bottle") return qty;
        const mlPerShot = unit === "large" ? 60 : 30;
        return (qty * mlPerShot) / (mlPerBottle || 750);
      }
      function bottlesInCart(cart, itemId) {
        return cart
          .filter((c) => c.itemId === itemId)
          .reduce(
            (sum, c) =>
              sum + cartLineBottles(c.unit, c.qty, c.mlPerBottle || 750),
            0,
          );
      }
      function calcTotals(subtotal, settings) {
        const rate = (+settings.gstRate || 18) / 100;
        if (settings.gstInclusive) {
          const gstAmount = subtotal - subtotal / (1 + rate);
          return {
            subtotal: subtotal / (1 + rate),
            gstAmount,
            total: subtotal,
          };
        }
        const gstAmount = subtotal * rate;
        return { subtotal, gstAmount, total: subtotal + gstAmount };
      }
      function isLowStock(qtyAvailable, lowStockThreshold) {
        return (+qtyAvailable || 0) <= (+lowStockThreshold || 2);
      }
      function bottlesToDisplay(qty) {
        const n = +qty || 0;
        if (n === 0) return "0 btl";
        if (n < 1) return `${(n * 750).toFixed(0)}ml`;
        return `${n % 1 === 0 ? n : n.toFixed(2)} btl`;
      }
      function mapInvRow(r) {
        return {
          id: r.id,
          firestoreId: r.firestoreId,
          name: r.name,
          category: r.category,
          imageUrl: r.imageUrl || "",
          price30ml: +r.price30ml || 0,
          priceBottle: +r.priceBottle || 0,
          mlPerBottle: +r.mlPerBottle || 750,
          qtyAvailable: +r.qtyAvailable || 0,
          lowStockThreshold: +r.lowStockThreshold || 2,
          active: r.active !== false,
          addedDate: r.addedDate || "",
          addedTime: r.addedTime || "",
          addedDateISO: r.addedDateISO || "",
        };
      }
      function mapOrderRow(r) {
        return {
          orderId: r.orderId,
          firestoreId: r.firestoreId,
          tableNumber: r.tableNumber,
          customerName: r.customerName,
          customerPhone: r.customerPhone,
          itemId: r.itemId,
          itemName: r.itemName,
          qty: +r.qty,
          unit: r.unit,
          unitPrice: +r.unitPrice,
          lineTotal: +r.lineTotal,
          status: r.status,
          date: r.date,
          time: r.time,
          category: r.category,
        };
      }
      function mapBillRow(r) {
        let items = [];
        try {
          items =
            typeof r.items === "string" ? JSON.parse(r.items) : r.items || [];
        } catch {
          items = [];
        }
        return {
          billId: r.billId,
          firestoreId: r.firestoreId,
          tableNumber: r.tableNumber,
          customerName: r.customerName,
          customerPhone: r.customerPhone,
          subtotal: +r.subtotal,
          gstAmount: +r.gstAmount,
          total: +r.total,
          dateTime: r.dateTime,
          items,
        };
      }

      function fileToBase64(file) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }
      async function uploadToGithub(file, itemId, settings) {
        const { githubOwner, githubRepo, githubToken } = settings;
        if (!githubOwner || !githubRepo || !githubToken) return "";
        const base64Full = await fileToBase64(file);
        const base64Content = base64Full.split(",")[1];
        const ext = file.type.includes("png") ? "png" : "jpg";
        const path = `images/${itemId}.${ext}`;
        let sha = undefined;
        try {
          const check = await fetch(
            `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`,
            { headers: { Authorization: `token ${githubToken}` } },
          );
          if (check.ok) {
            const ex = await check.json();
            sha = ex.sha;
          }
        } catch (_) {}
        const payload = {
          message: `Upload image for ${itemId}`,
          content: base64Content,
        };
        if (sha) payload.sha = sha;
        const res = await fetch(
          `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`,
          {
            method: "PUT",
            headers: {
              Authorization: `token ${githubToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          },
        );
        const json = await res.json();
        if (json.content?.download_url) return json.content.download_url;
        return `https://raw.githubusercontent.com/${githubOwner}/${githubRepo}/main/${path}`;
      }

          setToasts((p) => [...p, { id, msg, type }]);

        return { toasts, toast };

      // ── PIN SCREEN ────────────────────────────────────────────────
      function PinScreen({ onUnlock, toast, db }) {
        const [pin, setPin] = useState("");
        const [loading, setLoading] = useState(false);
        const [forgotLoading, setForgotLoading] = useState(false);
        const [forgotSent, setForgotSent] = useState(false);

        const handleUnlock = async () => {
          if (!pin) return;
          setLoading(true);
          try {
            const res = await db.verifyPin(pin);
            if (res.valid) onUnlock();
            else {
              toast("Wrong PIN", "error");
              setPin("");
            }
          } catch (e) {
            toast("Connection error", "error");
          }
          setLoading(false);
        };
        const handleForgotPin = async () => {
          setForgotLoading(true);
          try {
            await db.sendResetPin();
            setForgotSent(true);
            toast("PIN sent to email", "success");
          } catch (e) {
            toast(e.message || "Could not send email", "error");
          }
          setForgotLoading(false);
        };

        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              minHeight: "calc(100vh - 58px)",
              padding: 20,
            }}
          >
            <Card
              style={{
                padding: 36,
                width: "100%",
                maxWidth: 340,
                textAlign: "center",

            >
              <div style={{ fontSize: 40, marginBottom: 8 }}>🔐</div>

                style={{
                  fontFamily: "'Bebas Neue',cursive",
                  fontSize: 28,
                  color: "#1A1A2E",
                  marginBottom: 6,
                }}
              >

              <p style={{ color: "#888", fontSize: 13, marginBottom: 24 }}>

              <input
                type="password"

              {!forgotSent ? (
                <button

                    background: "none",
                    border: "none",
                    color: "#C8873A",
                    fontSize: 13,
                    textDecoration: "underline",
                    padding: 0,
                    opacity: forgotLoading ? 0.5 : 1,
                  }}
                >
                  {forgotLoading ? "Sending..." : "Forgot PIN? Email it to me"}
                </button>
              ) : (
                <div
                  style={{
                    color: "#27AE60",
                    fontSize: 12,
                    padding: "8px 12px",
                    background: "#F0FBF0",
                    borderRadius: 8,
                  }}
                >
                  ✅ PIN sent to registered email
                </div>
              )}
            </Card>
          </div>
        );
      }

      // ── SERVER APP ────────────────────────────────────────────────
      function ServerApp({
        inventory,
        orders,
        setOrders,
        bills,
        setBills,
        tables,
        getTableStatus,
        settings,
        toast,
        refreshInventory,
        db,
      }) {
        const [screen, setScreen] = useState("tables");
        const [activeTable, setActiveTable] = useState(null);
        const [customerInfo, setCustomerInfo] = useState({
          name: "",
          phone: "",
        });
        const [cart, setCart] = useState([]);
        const [search, setSearch] = useState("");
        const [catFilter, setCatFilter] = useState("All");
        const [orderTab, setOrderTab] = useState("menu");
        const [showBillConfirm, setShowBillConfirm] = useState(false);
        const [showRecentBills, setShowRecentBills] = useState(false);
        const [saving, setSaving] = useState(false);

        const openTable = (table) => {
          const existing = orders.filter(
            (o) => o.tableNumber === table && o.status === "open",
          );
          setActiveTable(table);
          setOrderTab("menu");
          if (existing.length) {
            setCustomerInfo({
              name: existing[0].customerName || "",
              phone: existing[0].customerPhone || "",
            });
            const cartMap = {};
            existing.forEach((o) => {
              const key = `${o.itemId}-${o.unit}`;
              if (cartMap[key]) {
                cartMap[key].qty += o.qty;
                cartMap[key].lineTotal += o.lineTotal;
              } else
                cartMap[key] = {
                  key,
                  itemId: o.itemId,
                  name: o.itemName,
                  qty: o.qty,
                  unit: o.unit,
                  unitPrice: o.unitPrice,
                  lineTotal: o.lineTotal,
                  category: o.category,
                };
            });
            setCart(Object.values(cartMap));
          } else {
            setCustomerInfo({ name: "", phone: "" });
            setCart([]);
          }
          setScreen("order");
        };

        const addToCart = (item, qty, unit) => {
          const isLiquor = LIQUOR_CATS.includes(item.category);
          const priceBottle =
            item.priceBottle ||
            calcBottlePrice(item.price30ml, item.mlPerBottle);
          const price30 =
            item.price30ml || calcPer30ml(priceBottle, item.mlPerBottle);
          let price;
          if (isLiquor) {
            price =
              unit === "bottle"
                ? priceBottle
                : price30 * (unit === "small" ? 1 : 2);
          } else {
            price = priceBottle;
          }
          const requestedBottles = cartLineBottles(unit, qty, item.mlPerBottle);
          const alreadyInCart = bottlesInCart(cart, item.id);
          const available = +item.qtyAvailable || 0;
          if (alreadyInCart + requestedBottles > available + 1e-9) {
            const remaining = Math.max(0, available - alreadyInCart);
            if (remaining <= 0) toast(`${item.name} is out of stock`, "error");
            else
              toast(
                `Only ${bottlesToDisplay(remaining)} of ${item.name} left in stock`,
                "error",
              );
            return;
          }
          const key = `${item.id}-${unit}`;
          setCart((prev) => {
            const ex = prev.find((c) => c.key === key);
            if (ex)
              return prev.map((c) =>
                c.key === key
                  ? { ...c, qty: c.qty + qty, lineTotal: (c.qty + qty) * price }
                  : c,
              );
            return [
              ...prev,
              {
                key,
                itemId: item.id,
                name: item.name,
                qty,
                unit,
                unitPrice: price,
                lineTotal: price * qty,
                category: item.category,
                mlPerBottle: item.mlPerBottle,
              },
            ];
          });
          toast(`${item.name} ×${qty} added`, "success");
        };

        const removeFromCart = (key) =>
          setCart((p) => p.filter((c) => c.key !== key));
        const updateCartQty = (key, delta) =>
          setCart((prev) => {
            const line = prev.find((c) => c.key === key);
            if (!line) return prev;
            const newQty = Math.max(1, line.qty + delta);
            if (delta > 0) {
              const invItem = inventory.find((i) => i.id === line.itemId);
              const available = +invItem?.qtyAvailable || 0;
              const otherLinesBottles = bottlesInCart(
                prev.filter((c) => c.key !== key),
                line.itemId,
              );
              const newLineBottles = cartLineBottles(
                line.unit,
                newQty,
                line.mlPerBottle || 750,
              );
              if (otherLinesBottles + newLineBottles > available + 1e-9) {
                toast(
                  `Only ${bottlesToDisplay(available)} of ${line.name} in stock`,
                  "error",
                );
                return prev;
              }
            }
            return prev.map((c) =>
              c.key === key
                ? { ...c, qty: newQty, lineTotal: newQty * c.unitPrice }
                : c,
            );
          });

        const rawSubtotal = cart.reduce((a, c) => a + c.lineTotal, 0);
        const { subtotal, gstAmount, total } = calcTotals(
          rawSubtotal,
          settings,
        );

        const buildOrderRows = (info) =>
          cart.map((c) => ({
            orderId: `ORD-${Date.now()}-${Math.random().toString(36).slice(2, 5).toUpperCase()}`,
            tableNumber: activeTable,
            customerName: info ? info.name || "" : customerInfo.name || "",
            customerPhone: info ? info.phone || "" : customerInfo.phone || "",
            itemId: c.itemId,
            itemName: c.name,
            qty: c.qty,
            unit: c.unit,
            unitPrice: c.unitPrice,
            lineTotal: c.lineTotal,
            category: c.category,
            status: "open",
            date: new Date().toLocaleDateString("en-IN"),
            time: new Date().toLocaleTimeString("en-IN"),
          }));

        const saveOccupied = async () => {
          if (!cart.length) return;
          setSaving(true);
          const newOrders = buildOrderRows();
          try {
            await db.saveOrder({ tableNumber: activeTable, orders: newOrders });
            setOrders((p) => [
              ...p.filter(
                (o) => !(o.tableNumber === activeTable && o.status === "open"),
              ),
              ...newOrders,
            ]);
            toast("Table marked occupied!", "success");
            await refreshInventory();
          } catch (e) {
            toast("Save failed", "error");
          }
          setSaving(false);
          setScreen("tables");
        };

        const generateBill = async (billCustomerInfo) => {
          if (!cart.length) return;
          setSaving(true);
          const billId = `BILL-${Date.now()}`;
          const bill = {
            billId,
            tableNumber: activeTable,
            customerName: billCustomerInfo.name || "",
            customerPhone: billCustomerInfo.phone || "",
            subtotal,
            gstAmount,
            total,
            dateTime: new Date().toLocaleString("en-IN"),
            items: cart.map((c) => ({
              name: c.name,
              qty: c.qty,
              unit: c.unit,
              rate: c.unitPrice,
              lineTotal: c.lineTotal,
              itemId: c.itemId,
              category: c.category,
            })),
          };
          try {
            await db.saveOrder({
              tableNumber: activeTable,
              orders: buildOrderRows(billCustomerInfo),
            });
            await db.saveBill(bill);
            await db.updateOrderStatus({
              tableNumber: activeTable,
              newStatus: "billed",
            });
            setBills((p) => [...p, bill]);
            setOrders((p) =>
              p.map((o) =>
                o.tableNumber === activeTable ? { ...o, status: "billed" } : o,
              ),
            );
            printBill(bill, settings);
            await refreshInventory();
            toast("Bill generated — printing!", "success");
          } catch (e) {
            toast("Bill save failed", "error");
          }
          setSaving(false);
          setShowBillConfirm(false);
          setScreen("tables");
        };

        const inventoryCats = ["All", ...CATEGORIES.slice(1)];
        const filtered = inventory.filter(
          (i) =>
            i.active &&
            (catFilter === "All" || i.category === catFilter) &&
            (i.name.toLowerCase().includes(search.toLowerCase()) ||
              i.category.toLowerCase().includes(search.toLowerCase())),
        );

        if (screen === "tables")
          return (
            <div style={{ padding: "14px", maxWidth: 800, margin: "0 auto" }}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: 14,
                }}
              >
                <div
                  style={{
                    fontFamily: "'Bebas Neue',cursive",
                    fontSize: 26,
                    color: "#1A1A2E",
                    letterSpacing: 2,
                  }}
                >
                  TABLES
                </div>
                <button
                  onClick={() => setShowRecentBills(true)}
                  style={{
                    background: "#1A1A2E",
                    color: "#C8873A",
                    border: "none",
                    borderRadius: 10,
                    padding: "9px 14px",
                    fontSize: 12,
                    fontWeight: 700,
                  }}
                >
                  🧾 Recent Bills
                </button>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(auto-fill,minmax(130px,1fr))",
                  gap: 10,
                }}
              >
                {tables.map((t) => {
                  const status = getTableStatus(t);
                  const cfg = {
                    free: {
                      bg: "#F0FBF0",
                      border: "#27AE60",
                      text: "#27AE60",
                      label: "FREE",
                    },
                    occupied: {
                      bg: "#FFF8F0",
                      border: "#C8873A",
                      text: "#C8873A",
                      label: "BUSY",
                    },
                    billed: {
                      bg: "#FFF0F0",
                      border: "#E74C3C",
                      text: "#E74C3C",
                      label: "BILLED",
                    },
                  }[status];
                  return (
                    <div
                      key={t}
                      onClick={() => openTable(t)}
                      style={{
                        background: cfg.bg,
                        border: `2px solid ${cfg.border}`,
                        borderRadius: 14,
                        padding: "22px 12px",
                        textAlign: "center",
                        cursor: "pointer",
                        userSelect: "none",
                      }}
                    >
                      <div
                        style={{
                          fontFamily: "'Bebas Neue',cursive",
                          fontSize: 36,
                          color: cfg.text,
                        }}
                      >
                        {t}
                      </div>
                      <div
                        style={{
                          fontSize: 10,
                          color: cfg.text,
                          letterSpacing: 2,
                          marginTop: 2,
                          fontWeight: 700,
                        }}
                      >
                        {cfg.label}
                      </div>
                    </div>
                  );
                })}
              </div>
              {showRecentBills && (
                <RecentBillsView
                  bills={bills}
                  settings={settings}
                  onClose={() => setShowRecentBills(false)}
                />
              )}

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              height: "calc(100vh - 58px)",
              overflow: "hidden",
            }}
          >
            <div
              style={{
                background: "#FFFFFF",
                padding: "8px 12px",
                borderBottom: "1px solid #EBEBF5",
                display: "flex",
                alignItems: "center",
                gap: 8,
                flexShrink: 0,
              }}
            >
              <button
                onClick={() => setScreen("tables")}
                style={{
                  background: "#F0F0F5",
                  border: "none",
                  color: "#1A1A2E",
                  borderRadius: 10,
                  padding: "10px 14px",
                  fontSize: 13,
                  fontWeight: 700,
                  minHeight: 44,
                  whiteSpace: "nowrap",
                }}
              >
                ← Back
              </button>
              <div
                style={{
                  fontFamily: "'Bebas Neue',cursive",
                  fontSize: 20,
                  color: "#C8873A",
                  letterSpacing: 2,
                  flex: 1,
                }}
              >
                TABLE {activeTable}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {["menu", "cart"].map((tab) => (
                  <button
                    key={tab}
                    onClick={() => setOrderTab(tab)}
                    style={{
                      background:
                        tab === "menu"
                          ? orderTab === tab

                          : orderTab === tab
                            ? "#1A1A2E"
                            : "#F0F0F5",
                      color:
                        tab === "menu"
                          ? orderTab === tab
                            ? "#FFF"
                            : "#1A1A2E"
                          : orderTab === tab
                            ? "#C8873A"
                            : "#1A1A2E",
                      border: "none",
                      borderRadius: 10,

      const BLANK_ROW = () => ({
        name: "",
        category: "Liquor",
        price30ml: "",
        priceBottle: "",
        mlPerBottle: 750,
        qtyAvailable: 1,
        lowStockThreshold: 2,
        imageFile: null,
        imgPreview: null,
      });

      function InventoryTab({ inventory, setInventory, settings, toast, db }) {
        const [showAdd, setShowAdd] = useState(false);
        const [editItem, setEditItem] = useState(null);
        const [catFilter, setCatFilter] = useState("All");
        const [rows, setRows] = useState([BLANK_ROW()]);
        const [saving, setSaving] = useState(false);

        const openAdd = () => {
          setEditItem(null);
          setRows([BLANK_ROW()]);
          setShowAdd(true);
        };
        const openEdit = (item) => {
          setEditItem(item);
          setRows([
            {
              name: item.name,
              category: item.category,
              price30ml: item.price30ml,
              priceBottle: item.priceBottle,
              mlPerBottle: item.mlPerBottle,
              qtyAvailable: item.qtyAvailable,
              lowStockThreshold: item.lowStockThreshold,
              imageFile: null,
              imgPreview: item.imageUrl || null,
            },
          ]);
          setShowAdd(true);
        };
        const updateRow = (i, key, val) =>
          setRows((prev) =>
            prev.map((r, idx) => (idx === i ? { ...r, [key]: val } : r)),
          );
        const addRow = () => setRows((prev) => [...prev, BLANK_ROW()]);
        const removeRow = (i) =>
          setRows((prev) => prev.filter((_, idx) => idx !== i));
        const handleImagePick = (i, e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => updateRow(i, "imgPreview", ev.target.result);
          reader.readAsDataURL(file);
          updateRow(i, "imageFile", file);
        };
        const handlePrice30Change = (i, val) => {
          updateRow(i, "price30ml", val);
          const row = rows[i];
          if (val && row.mlPerBottle)
            updateRow(i, "priceBottle", calcBottlePrice(val, row.mlPerBottle));
        };
        const handlePriceBottleChange = (i, val) => {
          updateRow(i, "priceBottle", val);
          const row = rows[i];
          if (val && row.mlPerBottle && LIQUOR_CATS.includes(row.category))
            updateRow(i, "price30ml", calcPer30ml(val, row.mlPerBottle));
        };
        const handleMlPerBottleChange = (i, val) => {
          const row = rows[i];
          updateRow(i, "mlPerBottle", val);
          if (row.price30ml && val)
            updateRow(i, "priceBottle", calcBottlePrice(row.price30ml, val));
        };

        const saveItems = async () => {
          if (rows.some((r) => !r.name.trim())) {
            toast("All item names required", "error");
            return;
          }
          setSaving(true);
          try {
            if (editItem) {
              const row = rows[0];
              let imageUrl = editItem.imageUrl || "";
              if (row.imageFile) {
                try {
                  imageUrl = await uploadToGithub(
                    row.imageFile,
                    editItem.id,
                    settings,
                  );
                } catch {
                  toast("Image upload failed", "info");
                }
              }
              const payload = {
                id: editItem.id,
                name: row.name.trim(),
                category: row.category,
                price30ml: +row.price30ml,
                priceBottle: +row.priceBottle,
                mlPerBottle: +row.mlPerBottle || 750,
                qtyAvailable: +row.qtyAvailable,
                lowStockThreshold: +row.lowStockThreshold,
                imageUrl,
              };
              await db.updateInventoryItem(payload);
              setInventory((p) =>
                p.map((i) => (i.id === editItem.id ? { ...i, ...payload } : i)),
              );
              toast("Item updated!", "success");
            } else {
              const normalize = (s) =>
                String(s || "")
                  .trim()
                  .toLowerCase();
              const existingByName = {};
              inventory.forEach((i) => {
                if (i.active) existingByName[normalize(i.name)] = i;
              });
              const decisions = [];
              for (const row of rows) {
                const match = existingByName[normalize(row.name)];
                if (match) {
                  const mergeStock = confirm(
                    `"${row.name.trim()}" already exists.\n\nOK = Update + combine stock\nCancel = Skip`,
                  );
                  if (mergeStock)
                    decisions.push({ row, mode: "merge", mergeTarget: match });
                  else decisions.push({ row, mode: "skip" });
                } else decisions.push({ row, mode: "new" });
              }
              const toCreate = decisions.filter((d) => d.mode === "new");
              const toMerge = decisions.filter((d) => d.mode === "merge");
              const skipped = decisions.filter((d) => d.mode === "skip").length;
              const createResults = await Promise.all(
                toCreate.map(async ({ row }) => {
                  let imageUrl = "";
                  if (row.imageFile) {
                    const tempId = `TMP-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                    try {
                      imageUrl = await uploadToGithub(
                        row.imageFile,
                        tempId,
                        settings,
                      );
                    } catch {
                      toast(`Image for ${row.name} failed`, "info");
                    }
                  }
                  const payload = {
                    name: row.name.trim(),
                    category: row.category,
                    price30ml: +row.price30ml,
                    priceBottle: +row.priceBottle,
                    mlPerBottle: +row.mlPerBottle || 750,
                    qtyAvailable: +row.qtyAvailable || 1,
                    lowStockThreshold: +row.lowStockThreshold || 2,
                    imageUrl,
                  };
                  const res = await db.addInventoryItem(payload);
                  return {
                    id: res.id,
                    firestoreId: res.firestoreId,
                    ...payload,
                    active: true,
                  };
                }),
              );
              if (createResults.length)
                setInventory((p) => [...p, ...createResults]);
              const mergeResults = await Promise.all(
                toMerge.map(async ({ row, mergeTarget }) => {
                  const combinedQty =
                    (+mergeTarget.qtyAvailable || 0) + (+row.qtyAvailable || 0);
                  let imageUrl = mergeTarget.imageUrl || "";
                  if (row.imageFile) {
                    try {
                      imageUrl = await uploadToGithub(
                        row.imageFile,
                        mergeTarget.id,
                        settings,
                      );
                    } catch {
                      toast(`Image for ${row.name} failed`, "info");
                    }
                  }
                  const payload = {
                    id: mergeTarget.id,
                    name: row.name.trim(),
                    category: row.category,
                    price30ml: +row.price30ml,
                    priceBottle: +row.priceBottle,
                    mlPerBottle: +row.mlPerBottle || 750,
                    qtyAvailable: combinedQty,
                    lowStockThreshold: +row.lowStockThreshold || 2,
                    imageUrl,
                  };
                  await db.updateInventoryItem(payload);
                  return payload;
                }),
              );
              if (mergeResults.length)
                setInventory((p) =>
                  p.map((i) => {
                    const m = mergeResults.find((r) => r.id === i.id);
                    return m ? { ...i, ...m } : i;
                  }),
                );
              const parts = [];
              if (createResults.length)
                parts.push(`${createResults.length} added`);
              if (mergeResults.length)
                parts.push(`${mergeResults.length} merged`);
              if (skipped) parts.push(`${skipped} skipped`);
              toast(
                parts.length ? parts.join(", ") : "Nothing saved",
                "success",
              );
            }
          } catch (e) {
            toast("Save failed: " + e.message, "error");
          }
          setSaving(false);
          setShowAdd(false);
          setEditItem(null);
          setRows([BLANK_ROW()]);
        };

        const deleteItem = async (id) => {
          if (!confirm("Mark item as inactive?")) return;
          try {
            await db.deleteInventoryItem({ id });
            setInventory((p) =>
              p.map((i) => (i.id === id ? { ...i, active: false } : i)),
            );
            toast("Item removed", "info");
          } catch {
            toast("Delete failed", "error");
          }
        };

        const cats = ["All", ...CATEGORIES.slice(1)];
        const displayed = inventory.filter(
          (i) => i.active && (catFilter === "All" || i.category === catFilter),
        );

        return (
          <div>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: 10,
              }}
            >
              <SectionTitle>Inventory</SectionTitle>
              <Btn onClick={openAdd} style={{ padding: "10px 18px" }}>
                + Add Items
              </Btn>
            </div>
            <CatTabs cats={cats} active={catFilter} onChange={setCatFilter} />
            <div style={{ height: 10 }} />
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))",
                gap: 10,
              }}
            >
              {displayed.map((item) => {
                const low = isLowStock(
                  item.qtyAvailable,
                  item.lowStockThreshold,
                );
                const isLiquor = LIQUOR_CATS.includes(item.category);
                const catEmoji =
                  {
                    Liquor: "🥃",
                    Beer: "🍺",
                    "Soft Drinks": "🥤",
                    Cocktails: "🍹",
                    Mocktails: "🧃",
                  }[item.category] || "🍸";
                return (
                  <Card
                    key={item.id}
                    style={{
                      padding: 12,
                      border: low ? "1.5px solid #F5C0BB" : "1px solid #EBEBF5",
                      position: "relative",
                    }}
                  >
                    {low && (
                      <div

      function ReportsTab({ bills, settings, db }) {
        const todayDate = (() => {
          const n = new Date();
          return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, "0")}-${String(n.getDate()).padStart(2, "0")}`;
        })();
        const [activeReport, setActiveReport] = useState("sales");
        const [fromDate, setFromDate] = useState("");
        const [toDate, setToDate] = useState(todayDate);
        const [showDetail, setShowDetail] = useState(null);
        // Inventory log state
        const [invLogs, setInvLogs] = useState([]);
        const [invLogsLoading, setInvLogsLoading] = useState(false);
        const [invFromDate, setInvFromDate] = useState("");
        const [invToDate, setInvToDate] = useState(todayDate);
        const [invActionFilter, setInvActionFilter] = useState("All");

        useEffect(() => {
          if (activeReport === "inventory") loadInvLogs();
        }, [activeReport]);

        const loadInvLogs = async () => {
          setInvLogsLoading(true);
          try {
            const data = await db.getInventoryLog();
            setInvLogs(data);
          } catch (e) {
            console.error("Failed to load inventory log", e);
          }
          setInvLogsLoading(false);
        };

        const filtered = bills.filter((b) => {
          if (!b.dateTime) return true;
          try {
            const d = new Date(b.dateTime);
            if (fromDate && d < new Date(fromDate)) return false;
            if (toDate && d > new Date(toDate + "T23:59:59")) return false;
          } catch {
            return true;
          }
          return true;
        });
        const totalRevenue = filtered.reduce((a, b) => a + (+b.total || 0), 0);
        const totalGST = filtered.reduce((a, b) => a + (+b.gstAmount || 0), 0);
        const itemTotals = {};
        filtered.forEach((b) => {
          (b.items || []).forEach((item) => {
            if (!itemTotals[item.name])
              itemTotals[item.name] = { qty: 0, revenue: 0 };
            itemTotals[item.name].qty += +item.qty || 0;
            itemTotals[item.name].revenue += +item.lineTotal || 0;
          });
        });
        const topItems = Object.entries(itemTotals)
          .sort((a, b) => b[1].revenue - a[1].revenue)
          .slice(0, 10);

        const filteredInvLogs = invLogs.filter((l) => {
          if (
            invActionFilter !== "All" &&
            (l.action || "add").toLowerCase() !== invActionFilter.toLowerCase()
          )
            return false;
          if (!l.loggedDateISO && !l.addedDateISO) return true;
          try {
            const d = new Date(l.loggedDateISO || l.addedDateISO);
            if (invFromDate && d < new Date(invFromDate)) return false;
            if (invToDate && d > new Date(invToDate + "T23:59:59"))
              return false;
          } catch {
            return true;
          }
          return true;
        });

        const exportCSV = () => {
          const header = "Bill ID,Table,Customer,Subtotal,GST,Total,Date\n";
          const rows = filtered
            .map(
              (b) =>
                `${b.billId},${b.tableNumber},${b.customerName},${(+b.subtotal).toFixed(2)},${(+b.gstAmount).toFixed(2)},${(+b.total).toFixed(2)},${b.dateTime}`,
            )
            .join("\n");
          const a = document.createElement("a");
          a.href = URL.createObjectURL(
            new Blob([header + rows], { type: "text/csv" }),
          );
          a.download = "bills-export.csv";
          a.click();
        };
        const exportInvLogCSV = () => {
          const header =
            "Date,Time,Action,Item Name,Category,Qty (Bottles),Price/30ml,Price/Bottle\n";
          const rows = filteredInvLogs
            .map(
              (l) =>
                `${l.loggedDate || l.addedDate || ""},${l.loggedTime || l.addedTime || ""},${l.action || "add"},${l.name || ""},${l.category || ""},${l.qtyAvailable != null ? l.qtyAvailable : ""},${l.price30ml != null ? l.price30ml : ""},${l.priceBottle != null ? l.priceBottle : ""}`,
            )
            .join("\n");
          const a = document.createElement("a");
          a.href = URL.createObjectURL(
            new Blob([header + rows], { type: "text/csv" }),
          );
          a.download = "inventory-log.csv";
          a.click();
        };

        const dateLabel =
          invFromDate && invToDate
            ? `${invFromDate} to ${invToDate}`
            : invFromDate
              ? `From ${invFromDate}`
              : invToDate
                ? `Up to ${invToDate}`
                : "All time";

        return (
          <div>
            {/* Report type toggle */}
            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
              {[
                { id: "sales", label: "💰 Sales" },
                { id: "inventory", label: "📦 Inventory Log" },
              ].map((r) => (
                <button
                  key={r.id}
                  onClick={() => setActiveReport(r.id)}
                  style={{
                    flex: 1,
                    padding: "11px 0",
                    background: activeReport === r.id ? "#1A1A2E" : "#F0F0F5",
                    color: activeReport === r.id ? "#C8873A" : "#666",
                    border: "none",
                    borderRadius: 12,
                    fontSize: 13,
                    fontWeight: 700,
                  }}
                >
                  {r.label}
                </button>
              ))}
            </div>

            {activeReport === "sales" && (
              <>
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    marginBottom: 14,
                  }}
                >
                  <SectionTitle>Sales Reports</SectionTitle>
                  <Btn
                    variant="secondary"
                    onClick={exportCSV}
                    style={{ padding: "9px 14px", fontSize: 12 }}
                  >
                    ⬇ CSV
                  </Btn>
                </div>
                <Card style={{ padding: "12px 14px", marginBottom: 14 }}>
                  <div
                    style={{
                      display: "flex",
                      gap: 10,
                      alignItems: "center",
                      flexWrap: "wrap",
                    }}
                  >
                    <div style={{ flex: 1, minWidth: 120 }}>
                      <Label>From Date</Label>
                      <input
                        type="date"
                        value={fromDate}
                        onChange={(e) => setFromDate(e.target.value)}
                        style={{ padding: "8px 10px" }}
                      />
                    </div>
                    <div style={{ flex: 1, minWidth: 120 }}>
                      <Label>To Date</Label>
                      <input
                        type="date"
                        value={toDate}
                        onChange={(e) => setToDate(e.target.value)}
                        style={{ padding: "8px 10px" }}
                      />
                    </div>
                    {(fromDate || toDate) && (
                      <button
                        onClick={() => {
                          setFromDate("");
                          setToDate("");
                        }}
                        style={{
                          background: "#F0F0F5",
                          border: "none",
                          borderRadius: 8,
                          padding: "8px 12px",
                          fontSize: 12,
                          fontWeight: 600,
                          color: "#888",
                          marginTop: 18,

                      >
                        Clear
                      </button>

                  </div>
                  <div style={{ marginTop: 8, fontSize: 11, color: "#888" }}>
                    {filtered.length} bill{filtered.length !== 1 ? "s" : ""}{" "}
                    shown
                  </div>
                </Card>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: 10,
                    marginBottom: 20,
                  }}
                >
                  {[
                    {
                      label: "Total Revenue",
                      value: `₹${totalRevenue.toLocaleString("en-IN", { maximumFractionDigits: 0 })}`,
                      color: "#C8873A",
                    },
                    {
                      label: "GST Collected",

                <Card style={{ marginBottom: 20 }}>

                        padding: 20,
                        textAlign: "center",
                        color: "#888",
                        fontSize: 13,

                    >
                      No data
                    </div>

                  {topItems.map(([name, data], i) => (
                    <div
                      key={name}
                      style={{
                        display: "flex",
                        alignItems: "center",

                      >

                </Card>
                <SectionTitle>Bill History</SectionTitle>
                <Card>
                  {filtered.length === 0 && (
                    <div

                        padding: 20,
                        textAlign: "center",

                  {filtered

                      <div key={b.billId}>

                            setShowDetail(
                              showDetail === b.billId ? null : b.billId,

                            padding: "12px 16px",
                            borderBottom: "1px solid #F0F0F5",

                              <div

      function PinChangeForm({ toast, db }) {
        const [currentPin, setCurrentPin] = useState("");
        const [newPin, setNewPin] = useState("");
        const [confirm, setConfirm] = useState("");
        const [saving, setSaving] = useState(false);
        const handleChange = async () => {
          if (!currentPin || !newPin) {
            toast("Fill in all fields", "error");
            return;
          }
          if (newPin !== confirm) {
            toast("New PINs don't match", "error");
            return;
          }
          if (newPin.length < 4) {
            toast("PIN must be at least 4 digits", "error");
            return;
          }
          setSaving(true);
          try {
            const verify = await db.verifyPin(currentPin);
            if (!verify.valid) {
              toast("Current PIN is wrong", "error");
              setSaving(false);
              return;
            }
            await db.saveSettings({ managerPin: newPin });
            toast("PIN changed!", "success");
            setCurrentPin("");
            setNewPin("");
            setConfirm("");
          } catch (e) {
            toast("Save failed", "error");
          }
          setSaving(false);
        };
        return (
          <div
            style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}
          >
            <div style={{ gridColumn: "1/-1" }}>
              <Label>Current PIN</Label>
              <input
                type="password"
                inputMode="numeric"
                maxLength={6}
                value={currentPin}
                onChange={(e) => setCurrentPin(e.target.value)}
                placeholder="Current PIN"
              />
            </div>
            <div>
              <Label>New PIN</Label>
              <input
                type="password"
                inputMode="numeric"
                maxLength={6}
                value={newPin}
                onChange={(e) => setNewPin(e.target.value)}
                placeholder="Min 4 digits"
              />
            </div>
            <div>
              <Label>Confirm New PIN</Label>
              <input
                type="password"
                inputMode="numeric"
                maxLength={6}
                value={confirm}
                onChange={(e) => setConfirm(e.target.value)}
                placeholder="Repeat"
              />
            </div>
            <div style={{ gridColumn: "1/-1" }}>
              <Btn
                onClick={handleChange}
                disabled={saving}
                style={{ width: "100%", padding: "13px 0" }}
              >
                {saving ? "Saving..." : "Change PIN"}
              </Btn>
            </div>
          </div>
        );
      }

        const [form, setForm] = useState({ ...settings });
        const [saving, setSaving] = useState(false);
        const save = async () => {
          setSaving(true);
          try {
            await db.saveSettings(form);
            setSettings(form);

            toast("Save failed", "error");

        const fields = [
          { key: "barName", label: "Bar Name", full: true },

          { key: "tables", label: "Tables (comma separated)", full: true },
          { key: "currency", label: "Currency Symbol" },

            <SectionTitle>Settings</SectionTitle>
            <Card
              style={{
                padding: "14px 16px",

                borderLeft: "4px solid #2980B9",
              }}
            >
              <div
                style={{
                  fontSize: 12,
                  fontWeight: 700,
                  color: "#2980B9",
                  marginBottom: 4,
                }}
              >
                🔥 Firebase Backend Active

              <div style={{ fontSize: 11, color: "#555" }}>

                Apps Script.
              </div>
            </Card>
            <Card style={{ padding: "20px 16px", marginBottom: 14 }}>
              <div
                style={{
                  marginBottom: 14,
                  display: "flex",
                  alignItems: "center",

                  padding: "10px 12px",
                  background: "#F7F8FA",
                  borderRadius: 10,
                }}
              >
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>
                    GST Inclusive Pricing
                  </div>

                  </div>
                </div>
                <button

                    setForm((p) => ({ ...p, gstInclusive: !p.gstInclusive }))

                  style={{
                    background: form.gstInclusive ? "#C8873A" : "#E0E0EE",
                    border: "none",

                  }}

                  <div
                    style={{
                      position: "absolute",

                </button>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: 12,
                }}
              >
                {fields.map((f) => (
                  <div key={f.key} style={f.full ? { gridColumn: "1/-1" } : {}}>
                    <Label>{f.label}</Label>
                    <input

              </div>
              <Btn
                onClick={save}

                style={{
                  marginTop: 20,
                  width: "100%",
                  padding: "14px 0",
                  fontSize: 14,
                }}
              >

            </Card>
            <Card style={{ padding: "20px 16px" }}>

                  fontFamily: "'Bebas Neue',cursive",

                }}
              >
                CHANGE MANAGER PIN
              </div>
              <PinChangeForm toast={toast} db={db} />
            </Card>
          </div>
        );
      }

      function Dashboard({

        orders,

            <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
              {tab === "overview" && (
                <OverviewTab

              {tab === "inventory" && (

      // ── ROOT APP ──────────────────────────────────────────────────
      function App() {
        const db = useDB();
        const [appAuthed, setAppAuthed] = useState(
          () => sessionStorage.getItem(SESSION_KEY) === "1",
        );
        const [mode, setMode] = useState("server");
        const [pinUnlocked, setPinUnlocked] = useState(false);
        const [loading, setLoading] = useState(false);
        const [inventory, setInventory] = useState([]);
        const [orders, setOrders] = useState([]);
        const [bills, setBills] = useState([]);
        const [settings, setSettings] = useState(DEFAULT_SETTINGS);
        const { toasts, toast } = useToast();

        const tables = useMemo(
          () =>
            settings.tables
              ?.split(",")
              .map((t) => t.trim())
              .filter(Boolean) || [],
          [settings.tables],
        );
        const getTableStatus = useCallback(
          (table) => {
            const rows = orders.filter(
              (o) => o.tableNumber === table && o.status === "open",
            );
            if (!rows.length) return "free";
            return "occupied";
          },
          [orders],
        );

        const refreshInventory = async () => {
          if (!db) return;
          try {
            const res = await db.getInventory();
            if (res?.length) setInventory(res.map(mapInvRow));
          } catch (e) {}
        };

        useEffect(() => {
          if (!appAuthed || !db) return;
          const load = async () => {
            setLoading(true);
            try {
              const [inv, ord, bl, sett] = await Promise.all([
                db.getInventory(),
                db.getOrders(),
                db.getBills(),
                db.getSettings(),
              ]);
              if (inv?.length) setInventory(inv.map(mapInvRow));
              if (ord?.length) setOrders(ord.map(mapOrderRow));
              if (bl?.length) setBills(bl.map(mapBillRow));
              if (sett && Object.keys(sett).length)
                setSettings((s) => ({ ...s, ...sett }));
            } catch (e) {
              toast("Could not load data from Firebase", "error");
            }
            setLoading(false);
          };
          load();
        }, [appAuthed, db]);

        const handleModeChange = (m) => {
          setMode(m);
          if (m === "server") setPinUnlocked(false);
        };

        if (!db) return <LoadingScreen />;
        if (!appAuthed)
          return (
            <>
              <AppLoginScreen
                onAuth={() => setAppAuthed(true)}
                toast={toast}
                db={db}
              />
              <ToastContainer toasts={toasts} />
            </>
          );
        if (loading) return <LoadingScreen />;

        return (
          <div
            style={{
              background: "#F7F8FA",
              minHeight: "100vh",
              color: "#1A1A2E",
            }}
          >
            <TopBar
              mode={mode}
              setMode={handleModeChange}
              barName={settings.barName}
            />
            {mode === "server" && (
              <ServerApp
                inventory={inventory}
                orders={orders}
                setOrders={setOrders}
                bills={bills}
                setBills={setBills}
                tables={tables}
                getTableStatus={getTableStatus}
                settings={settings}
                toast={toast}
                refreshInventory={refreshInventory}
                db={db}
              />
            )}
            {mode === "dashboard" &&
              (pinUnlocked ? (
                <Dashboard
                  inventory={inventory}
                  setInventory={setInventory}
                  orders={orders}
                  bills={bills}
                  setBills={setBills}
                  settings={settings}
                  setSettings={setSettings}
                  tables={tables}
                  getTableStatus={getTableStatus}
                  toast={toast}
                  refreshInventory={refreshInventory}
                  db={db}
                />
              ) : (
                <PinScreen
                  onUnlock={() => setPinUnlocked(true)}
                  toast={toast}
                  db={db}
                />
              ))}
            <ToastContainer toasts={toasts} />
          </div>
        );
      }

      try {
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (e) {
        const el = document.getElementById("vb-err");
        if (el) {
          el.style.display = "block";
          el.textContent = "Error: " + e.message;
        }
      }
    </script>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("vb-err"),
          init = document.getElementById("vb-init");
        if (el && init) {
          init.style.display = "flex";
          el.style.display = "block";
          el.textContent =
            (e.message || "Script failed to load") +
            (e.filename ? " — " + e.filename.split("/").pop() : "");
        }
      });
      setTimeout(function () {
        var init = document.getElementById("vb-init");
        if (init && init.style.display !== "none") {
          var el = document.getElementById("vb-err");
          if (el && !el.textContent) {
            el.style.display = "block";
            el.textContent =
              "Timed out — CDN may be blocked. Try refreshing or check network.";
          }
        }
      }, 10000);
    </script>
  </body>
